server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS; re-resolve after api/worker recreate
  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 5s;

  # NOTE: when proxy_pass uses a variable, do NOT append a URI path,
  # otherwise nginx drops the original request path (becomes /api/).
  location /api/ {
    set $atv_api_upstream api;
    proxy_pass http://$atv_api_upstream:3002;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    set $atv_api_upstream api;
    proxy_pass http://$atv_api_upstream:3002;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /uploads/ {
    set $atv_api_upstream api;
    proxy_pass http://$atv_api_upstream:3002;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    set $atv_api_upstream api;
    proxy_pass http://$atv_api_upstream:3002;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
